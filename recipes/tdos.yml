---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: tdos-bluebuild
description: my bazzite-dx spin for gaming and dev
base-image: ghcr.io/ublue-os/bazzite-dx
image-version: latest

modules:
  - type: dnf
    repos:
      copr:
        - sdegler/hyprland
    group-install:
      with-optional: true
      packages:
        - c-development
        - development-tools
    install:
      packages:
        # misc
        - vim
        - bash-completion
        - git
        - syncthing

        # coding
        - rustup
        - zig
        - golang
        - gopls
        - cmake
        - ninja-build
        - bear
        - clang
        - clang-tools-extra
        - nodejs
        
        # emacs
        - emacs
        - libvterm
        - mupdf
        - mupdf-devel
        - tree-sitter-cli

        # - libgccjit
        # - libgccjit-devel
        # - libtree-sitter
        # - libtree-sitter-devel
        # - jansson-devel
        # - libvterm-devel
        # - gtk3
        # - gtk3-devel
        # - gtk4
        # - gtk4-devel
        # - webkit2gtk4.1-devel
        # - webkitgtk6.0-devel
        # - gnutls-devel

        # desktop/hyprland
        - alacritty
        - pavucontrol
        - hyprland
        - hyprland-guiutils
        - xdg-desktop-portal-hyprland
        - hyprpaper
        - hyprlock
        - hypridle
        - hyprsunset
        - hyprpolkitagent
        - hyprshot
        - dunst
        - rofi
        - waybar
        - xorg-x11-server-Xwayland
        - wl-clipboard
        - flameshot
        - imv
        - mpv
        - vlc
        - playerctl
        - brightnessctl

  - type: rpm-ostree
    repos:
      - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
    keys:
      - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
    optfix:
      - brave.com
    install:
      - brave-browser

  - type: script
    snippets:
      - "dnf5 -y builddep emacs"
  - type: signing
